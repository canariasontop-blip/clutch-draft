name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.HETZNER_PASSWORD }}" ssh -o StrictHostKeyChecking=no root@116.203.96.243 "
            cd /root &&
            git pull origin main &&
            npm install --production &&
            pm2 restart clutch-web &&
            pm2 restart clutch-bot
          "