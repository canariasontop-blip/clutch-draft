name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 116.203.96.243 >> ~/.ssh/known_hosts

      - name: Check key
        run: |
          wc -c ~/.ssh/id_ed25519
          head -1 ~/.ssh/id_ed25519
          tail -1 ~/.ssh/id_ed25519

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@116.203.96.243 "
            cd /root &&
            git pull origin main &&
            npm install --production &&
            pm2 restart clutch-web &&
            pm2 restart clutch-bot
          "